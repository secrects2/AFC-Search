<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AFC 價格監控</title>
  <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>AFC 價格監控</h1>
      <p>本機稽核儀表板</p>
    </div>
    <div style="display:flex;gap:8px">
      <form method="post" action="/monitor/run">
        <button class="primary" type="submit" {% if run_status.running %}disabled{% endif %}>
          {% if run_status.running %}執行中{% else %}每日監測{% endif %}
        </button>
      </form>
      <form method="post" action="/discovery/run">
        <button class="secondary" type="submit" {% if run_status.running %}disabled{% endif %}>
          搜尋新連結
        </button>
      </form>
    </div>
  </header>
  <nav class="nav">
    <a class="{{ 'active' if active == 'dashboard' else '' }}" href="/">儀表板</a>
    <a class="{{ 'active' if active == 'products' else '' }}" href="/products">商品<span class="desktop-only">清單</span></a>
    <a class="{{ 'active' if active == 'candidates' else '' }}" href="/candidates">待審<span class="desktop-only">商品</span></a>
    <a class="{{ 'active' if active == 'exclusions' else '' }}" href="/exclusions">挑除<span class="desktop-only">清單</span></a>
    <a class="{{ 'active' if active == 'results' else '' }}" href="/monitor/results">監測<span class="desktop-only">結果</span></a>
    <a class="{{ 'active' if active == 'violations' else '' }}" href="/monitor/violations">疑似<span class="desktop-only">破價</span></a>
    <a class="{{ 'active' if active == 'api-usage' else '' }}" href="/api-usage">API<span class="desktop-only"> 用量</span></a>
  </nav>
  <main>
    {% if run_status.warning %}
      <div class="notice">{{ run_status.warning }}</div>
    {% endif %}
    <div id="progress-container" style="display:{% if run_status.running %}block{% else %}none{% endif %};margin-bottom:16px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px;">
        <span class="status-line" style="font-weight:600;color:#1a73e8;">
          {{ run_status.message }}
        </span>
        <span id="progress-pct" style="font-size:14px;color:#666;">
          {% if run_status.total > 0 %}{{ run_status.percent }}%{% endif %}
        </span>
      </div>
      <div style="background:#e0e0e0;border-radius:8px;height:10px;overflow:hidden;">
        <div id="progress-bar" style="
          background:linear-gradient(90deg,#1a73e8,#4fc3f7);
          height:100%;
          border-radius:8px;
          width:{{ run_status.percent }}%;
          transition:width 0.5s ease;
        "></div>
      </div>
    </div>
    {% block content %}{% endblock %}
  </main>
<script>
(function() {
  const statusLine = document.querySelector('.status-line');
  const progressBar = document.getElementById('progress-bar');
  const progressPct = document.getElementById('progress-pct');
  const progressContainer = document.getElementById('progress-container');
  const buttons = document.querySelectorAll('form[action*="/run"], form[action*="/discovery"] button');
  let wasRunning = {% if run_status.running %}true{% else %}false{% endif %};
  let pollTimer = null;

  function updateUI(data) {
    // Update progress bar
    if (data.running && progressContainer) {
      progressContainer.style.display = 'block';
      if (progressBar) {
        progressBar.style.width = (data.percent || 0) + '%';
      }
      if (progressPct && data.total > 0) {
        progressPct.textContent = data.percent + '% (' + data.progress + '/' + data.total + ')';
      }
    } else if (!data.running && progressContainer) {
      // Keep visible briefly after completion to show final message
      if (progressBar) progressBar.style.width = '100%';
      if (progressPct) progressPct.textContent = '';
    }

    // Update status text
    if (statusLine) {
      let msg = data.message || '';
      if (data.running) {
        msg = '⏳ ' + msg;
      }
      statusLine.textContent = msg;
    }

    // Update button disabled state
    buttons.forEach(btn => {
      btn.disabled = !!data.running;
      if (data.running) {
        btn.style.opacity = '0.6';
        btn.style.cursor = 'not-allowed';
      } else {
        btn.style.opacity = '';
        btn.style.cursor = '';
      }
    });

    // If was running and now stopped, reload page to get fresh data
    if (wasRunning && !data.running) {
      wasRunning = false;
      clearInterval(pollTimer);
      setTimeout(() => window.location.reload(), 1500);
      return;
    }
    wasRunning = data.running;
  }

  function poll() {
    fetch('/run-status')
      .then(r => r.json())
      .then(data => {
        updateUI(data);
        // Start or stop polling based on running state
        if (data.running && !pollTimer) {
          pollTimer = setInterval(poll, 2000);
        } else if (!data.running && pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
      })
      .catch(() => {});
  }

  // Start polling if currently running
  if (wasRunning) {
    pollTimer = setInterval(poll, 2000);
  }

  // Also poll once on page load to catch state changes
  setTimeout(poll, 1000);
})();
</script>
</body>
</html>
